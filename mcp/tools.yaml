sources:
  # PostgreSQL — 5 databases
  postgres_bookreview:
    kind: postgres
    host: 127.0.0.1
    port: 5432
    database: bookreview
    user: postgres
    password: ${PG_PASSWORD}

  postgres_crmarenapro:
    kind: postgres
    host: 127.0.0.1
    port: 5432
    database: crmarenapro
    user: postgres
    password: ${PG_PASSWORD}

  postgres_googlelocal:
    kind: postgres
    host: 127.0.0.1
    port: 5432
    database: googlelocal
    user: postgres
    password: ${PG_PASSWORD}

  postgres_pancancer:
    kind: postgres
    host: 127.0.0.1
    port: 5432
    database: pancancer
    user: postgres
    password: ${PG_PASSWORD}

  postgres_patents:
    kind: postgres
    host: 127.0.0.1
    port: 5432
    database: patents
    user: postgres
    password: ${PG_PASSWORD}

  # MongoDB — 2 databases
  mongo_yelp:
    kind: mongodb
    uri: ${MONGO_URI}
    database: yelp_business

  mongo_agnews:
    kind: mongodb
    uri: ${MONGO_URI}
    database: agnews_articles

  # SQLite — one source per file
  sqlite_yelp_user:
    kind: sqlite
    database: ${DAB_PATH}/query_yelp/query_dataset/yelp_user.db

  sqlite_agnews_metadata:
    kind: sqlite
    database: ${DAB_PATH}/query_agnews/query_dataset/metadata.db

  sqlite_bookreview:
    kind: sqlite
    database: ${DAB_PATH}/query_bookreview/query_dataset/review_query.db

  sqlite_crmarenapro_core:
    kind: sqlite
    database: ${DAB_PATH}/query_crmarenapro/query_dataset/core_crm.db

  sqlite_crmarenapro_products:
    kind: sqlite
    database: ${DAB_PATH}/query_crmarenapro/query_dataset/products_orders.db

  sqlite_crmarenapro_territory:
    kind: sqlite
    database: ${DAB_PATH}/query_crmarenapro/query_dataset/territory.db

  sqlite_deps_dev_package:
    kind: sqlite
    database: ${DAB_PATH}/query_DEPS_DEV_V1/query_dataset/package_query.db

  sqlite_deps_dev_project:
    kind: sqlite
    database: ${DAB_PATH}/query_DEPS_DEV_V1/query_dataset/project_query.db

  sqlite_github_artifacts:
    kind: sqlite
    database: ${DAB_PATH}/query_GITHUB_REPOS/query_dataset/repo_artifacts.db

  sqlite_github_metadata:
    kind: sqlite
    database: ${DAB_PATH}/query_GITHUB_REPOS/query_dataset/repo_metadata.db

  sqlite_googlelocal_review:
    kind: sqlite
    database: ${DAB_PATH}/query_googlelocal/query_dataset/review_query.db

  sqlite_music_brainz:
    kind: sqlite
    database: ${DAB_PATH}/query_music_brainz_20k/query_dataset/tracks.db

  sqlite_pancancer_molecular:
    kind: sqlite
    database: ${DAB_PATH}/query_PANCANCER_ATLAS/query_dataset/pancancer_molecular.db

  sqlite_stockindex_info:
    kind: sqlite
    database: ${DAB_PATH}/query_stockindex/query_dataset/indexInfo_query.db

  sqlite_stockindex_trade:
    kind: sqlite
    database: ${DAB_PATH}/query_stockindex/query_dataset/indextrade_query.db

  sqlite_stockmarket_info:
    kind: sqlite
    database: ${DAB_PATH}/query_stockmarket/query_dataset/stockinfo_query.db

  sqlite_stockmarket_trade:
    kind: sqlite
    database: ${DAB_PATH}/query_stockmarket/query_dataset/stocktrade_query.db

  sqlite_patents:
    kind: sqlite
    database: ${DAB_PATH}/query_PATENTS/query_dataset/patent_publication.db

  # DuckDB — one source per file
  duckdb_crmarenapro_activities:
    kind: duckdb
    database: ${DAB_PATH}/query_crmarenapro/query_dataset/activities.duckdb

  duckdb_crmarenapro_sales:
    kind: duckdb
    database: ${DAB_PATH}/query_crmarenapro/query_dataset/sales_pipeline.duckdb

  duckdb_music_brainz:
    kind: duckdb
    database: ${DAB_PATH}/query_music_brainz_20k/query_dataset/sales.duckdb


tools:
  # PostgreSQL tools
  query_postgres_bookreview:
    kind: postgres-sql
    source: postgres_bookreview
    description: Query the bookreview PostgreSQL database. Contains books_info table with book details.
    statement: ${ sql }

  query_postgres_crmarenapro:
    kind: postgres-sql
    source: postgres_crmarenapro
    description: Query the crmarenapro PostgreSQL database. Contains Case, casehistory__c, emailmessage, issue__c, knowledge__kav, livechattranscript tables.
    statement: ${ sql }

  query_postgres_googlelocal:
    kind: postgres-sql
    source: postgres_googlelocal
    description: Query the googlelocal PostgreSQL database. Contains business_description table.
    statement: ${ sql }

  query_postgres_pancancer:
    kind: postgres-sql
    source: postgres_pancancer
    description: Query the pancancer PostgreSQL database. Contains clinical_info table.
    statement: ${ sql }

  query_postgres_patents:
    kind: postgres-sql
    source: postgres_patents
    description: Query the patents PostgreSQL database. Contains cpc_definition table.
    statement: ${ sql }

  # MongoDB tools
  query_mongo_yelp:
    kind: mongodb-aggregate
    source: mongo_yelp
    description: Query yelp_business MongoDB database. Contains business and checkin collections.
    collection: ${ collection }
    pipeline: ${ pipeline }

  query_mongo_agnews:
    kind: mongodb-aggregate
    source: mongo_agnews
    description: Query agnews_articles MongoDB database. Contains articles collection.
    collection: ${ collection }
    pipeline: ${ pipeline }

  # SQLite tools
  query_sqlite_yelp_user:
    kind: sqlite-sql
    source: sqlite_yelp_user
    description: Query yelp_user SQLite database. Contains yelp user data.
    statement: ${ sql }

  query_sqlite_agnews_metadata:
    kind: sqlite-sql
    source: sqlite_agnews_metadata
    description: Query agnews metadata SQLite database.
    statement: ${ sql }

  query_sqlite_bookreview:
    kind: sqlite-sql
    source: sqlite_bookreview
    description: Query bookreview SQLite database. Contains review_query table.
    statement: ${ sql }

  query_sqlite_crmarenapro_core:
