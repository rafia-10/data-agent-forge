    statement: ${ sql }

  query_sqlite_crmarenapro_products:
    kind: sqlite-sql
    source: sqlite_crmarenapro_products
    description: Query crmarenapro products and orders SQLite database.
    statement: ${ sql }

  query_sqlite_crmarenapro_territory:
    kind: sqlite-sql
    source: sqlite_crmarenapro_territory
    description: Query crmarenapro territory SQLite database.
    statement: ${ sql }

  query_sqlite_deps_dev_package:
    kind: sqlite-sql
    source: sqlite_deps_dev_package
    description: Query deps.dev package SQLite database.
    statement: ${ sql }

  query_sqlite_deps_dev_project:
    kind: sqlite-sql
    source: sqlite_deps_dev_project
    description: Query deps.dev project SQLite database.
    statement: ${ sql }

  query_sqlite_github_artifacts:
    kind: sqlite-sql
    source: sqlite_github_artifacts
    description: Query GitHub repos artifacts SQLite database.
    statement: ${ sql }

  query_sqlite_github_metadata:
    kind: sqlite-sql
    source: sqlite_github_metadata
    description: Query GitHub repos metadata SQLite database.
    statement: ${ sql }

  query_sqlite_googlelocal_review:
    kind: sqlite-sql
    source: sqlite_googlelocal_review
    description: Query googlelocal review SQLite database.
    statement: ${ sql }

  query_sqlite_music_brainz:
    kind: sqlite-sql
    source: sqlite_music_brainz
    description: Query music brainz tracks SQLite database.
    statement: ${ sql }

  query_sqlite_pancancer_molecular:
    kind: sqlite-sql
    source: sqlite_pancancer_molecular
    description: Query pancancer molecular SQLite database.
    statement: ${ sql }

  query_sqlite_stockindex_info:
    kind: sqlite-sql
    source: sqlite_stockindex_info
    description: Query stock index info SQLite database.
    statement: ${ sql }

  query_sqlite_stockindex_trade:
    kind: sqlite-sql
    source: sqlite_stockindex_trade
    description: Query stock index trade SQLite database.
    statement: ${ sql }

  query_sqlite_stockmarket_info:
    kind: sqlite-sql
    source: sqlite_stockmarket_info
    description: Query stock market info SQLite database.
    statement: ${ sql }

  query_sqlite_stockmarket_trade:
    kind: sqlite-sql
    source: sqlite_stockmarket_trade
    description: Query stock market trade SQLite database.
    statement: ${ sql }

  query_sqlite_patents:
